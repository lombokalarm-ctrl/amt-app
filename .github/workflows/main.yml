name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # Membuat file .env di folder utama repositori
    - name: Create .env File
      run: |
        echo "API_URL=https://example.com" > .env
        echo "API_KEY=mock_key" >> .env

    # Melakukan build menggunakan gradle sistem (bukan ./gradlew)
    - name: Build with Gradle
      run: gradle assembleDebug

    # Mengunggah hasil APK jika berhasil dibuat
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: |
          **/build/outputs/apk/debug/*.apk
