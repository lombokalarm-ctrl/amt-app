name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 1. Membuat file .env tiruan
    # 2. Membuat file debug.keystore tiruan langsung di tempat yang dicari oleh gradle
    # 3. Membuat file google-services.json kosong jika dibutuhkan oleh plugin
    <button class="suggest-edit-btn" data-file-path=".github/workflows/main.yml">Edit File</button>
    - name: Setup Mock Environment & Keystore
      run: |
        echo "API_URL=https://example.com" > .env
        echo "API_KEY=mock_key" >> .env
        
        # Membuat debug.keystore otomatis agar lolos validasi signing config
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        
        # Membuat file mock google-services.json kosong agar plugin firebase tidak komplain
        mkdir -p app/src/google
        echo "{}" > app/google-services.json

    # Melakukan build menggunakan gradle sistem
    - name: Build with Gradle
      run: gradle assembleDebug

    # Mengunggah hasil APK jika berhasil dibuat
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: |
          **/build/outputs/apk/debug/*.apk
