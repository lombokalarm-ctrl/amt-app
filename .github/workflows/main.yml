name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # Menemukan letak folder proyek secara otomatis dan membuat file .env tiruan
    - name: Create Mock .env File
      run: |
        GRADLE_DIR=$(find . -name "gradlew" -exec dirname {} \;)
        echo "Project found in: $GRADLE_DIR"
        echo "API_URL=https://example.com" > "$GRADLE_DIR/.env"
        echo "API_KEY=mock_key" >> "$GRADLE_DIR/.env"
        echo "GRADLE_PATH=$GRADLE_DIR" >> $GITHUB_ENV

    # Memberikan izin eksekusi menggunakan path otomatis yang ditemukan
    - name: Grant execute permission for gradlew
      run: chmod +x ${{ env.GRADLE_PATH }}/gradlew
      
    # Menjalankan build dari folder proyek tersebut
    - name: Build with Gradle
      run: |
        cd ${{ env.GRADLE_PATH }}
        ./gradlew assembleDebug

    # Mengunggah hasil APK yang berhasil dibuat
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: |
          **/build/outputs/apk/debug/*.apk
